services:
  postgres:
    image: postgres:16-alpine
    container_name: orbitform-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: dev
    ports:
      - "5434:5432"
    volumes:
      - orbitform_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d dev"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

volumes:
  orbitform_pg_data:
